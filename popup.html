<!DOCTYPE html>
<html>

<head>
  <link rel="stylesheet" href="popup.css">
  <meta charset="UTF-8">
</head>

<body>
  <div class="container">
    <h2>AI Note Generator</h2>

    <div class="settings-panel">
      <input type="password" id="apiKey" placeholder="Gemini API Key (AIza...)" />
      <textarea id="customPrompt" placeholder="Custom Prompt (Use {studentName}, {language}, {project}, {bullets})"></textarea>
      <button id="saveBtn">Save Settings</button>
    </div>
    <div id="status" class="status-msg"></div>

    <div id="scrapedInfo"
      style="margin-top: 10px; padding: 10px; background: #fff; border: 1px solid #ced4da; border-radius: 4px; font-size: 13px;">
      <h3 style="margin: 0 0 5px 0; font-size: 13px; color: #00aa00;">Active Context</h3>
      <div style="margin-bottom: 2px;"><strong>Student:</strong> <span id="ctxName">Loading...</span></div>
      <div style="margin-bottom: 2px;"><strong>Language:</strong> <span id="ctxLang">Loading...</span></div>
      <div><strong>Project:</strong> <span id="ctxProj">Loading...</span></div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>

</html>
